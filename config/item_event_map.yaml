# 8-K Item 번호 → 기본 이벤트 타입/중요도/권한 매핑 (V4 ITEM_EVENT_MAP)
# LLM에 본문을 넘기기 전에 코드가 1차 분류·기본값을 부여한다.
# hard_risk: true 인 Item은 LLM이 중립이라 판단해도 하드룰이 우선한다.

items:
  "1.01":
    event_type: material_agreement   # 중요한 확정 계약 체결 (M&A 메인 타겟)
    default_importance: 6.5
    default_permission: WATCH_ONLY
  "1.02":
    event_type: material_agreement   # 중요한 계약 종료 (대체로 위험)
    default_importance: 6.5
    default_permission: WATCH_ONLY
  "2.01":
    event_type: ma                   # 인수·처분 완료
    default_importance: 7.0
    default_permission: WATCH_ONLY
  "2.02":
    event_type: earnings             # 실적 발표
    default_importance: 7.5
    default_permission: WATCH_ONLY
  "2.05":
    event_type: other                # 구조조정 비용
    default_importance: 5.0
    default_permission: WATCH_ONLY
  "2.06":
    event_type: other                # 손상차손 (위험)
    default_importance: 7.5
    default_permission: WATCH_ONLY
    hard_risk: true
  "3.01":
    event_type: delisting_halt       # 상장폐지 관련 통지
    default_importance: 9.5
    default_permission: BLOCK_BUY
    hard_risk: true
  "4.01":
    event_type: other                # 감사인 변경 (회계 리스크)
    default_importance: 8.5
    default_permission: BLOCK_BUY
    hard_risk: true
  "5.02":
    event_type: management_change    # 임원·이사 변경
    default_importance: 6.5
    default_permission: WATCH_ONLY
  "8.01":
    event_type: other                # 기타 주요 사건 (LLM 세부 해석 필요)
    default_importance: 4.0
    default_permission: WATCH_ONLY

# 매핑에 없는 Item의 기본값
default:
  event_type: other
  default_importance: 3.0
  default_permission: WATCH_ONLY
